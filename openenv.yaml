name: kaizen-os
version: 1.0.0
description: >
  An agentic OS management environment where an LLM monitors real system
  telemetry, detects chaos events (memory leaks, CPU hogs, thermal spikes,
  zombie storms, fork bombs, semantic process conflicts), and takes corrective
  actions via structured tool calls. Trained with SFT + GRPO on Qwen2.5-3B.
author: YOUR_NAME
theme: "3.1"
theme_name: "World Modeling — Professional Tasks"

environment:
  entry_point: environment.kaizen_env:KaizenEnv
  base_class: gymnasium.Env
  observation_space: text
  action_space: text
  reward_range: [-15.0, 10.0]
  max_steps: 10
  chaos_inject_step: 3

chaos_scenarios:
  - name: memory_leak
    resolution: kill chaos process (pid 2847)
    difficulty: easy
  - name: cpu_hog
    resolution: kill chaos process (pid 3991)
    difficulty: easy
  - name: thermal_spike
    resolution: kill or thermal_mitigation
    difficulty: medium
  - name: zombie_storm
    resolution: kill parent process (pid 5512)
    difficulty: medium
  - name: fork_bomb
    resolution: kill parent (pid 6631) NOT busiest child (pid 6700)
    difficulty: hard
  - name: semantic_decoy
    resolution: kill ad_renderer (pid 7741) NOT hospital_monitor (pid 7700)
    difficulty: hard
    note: >
      Two processes at identical CPU%. Only the log distinguishes them.
      No rule-based system can solve this scenario.

actions:
  - kill_process
  - thermal_mitigation
  - allocate_memory
  - prioritize_task
  - inspect_logs
  - list_processes
  - wait

reward_components:
  parse_failure: -1.0
  protected_process_kill: -10.0
  wrong_semantic_kill: -15.0
  thermal_improvement: "delta_thermal * 0.15"
  cpu_improvement: "delta_cpu * 0.10"
  critical_process_alive: "+0.5 per critical process"
  chaos_resolved: +3.0
  system_nominal: +1.0
  unnecessary_kill: -2.0

training:
  framework: unsloth + trl
  algorithm: SFT then GRPO
  base_model: Qwen/Qwen2.5-3B-Instruct
  lora_rank: 16
  quantisation: 4-bit NF4
  sft_steps: 100
  grpo_steps: 80
  group_size: 4
  hardware: Google Colab A100
  colab_notebook: "https://colab.research.google.com/drive/YOUR_NOTEBOOK_ID"

huggingface:
  space_url: "https://huggingface.co/spaces/YOUR_USERNAME/kaizen-os"
  model_url: "https://huggingface.co/YOUR_USERNAME/kaizen-os-grpo"

partial_observability:
  hidden_fields:
    - active_chaos
  agent_must_infer_from:
    - cpu_percent
    - thermal_celsius
    - ram_percent
    - log_snippet
    - process_list