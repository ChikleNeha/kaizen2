name: KaizenOS
version: "1.0"
description: >
  A reinforcement learning environment where an LLM agent autonomously manages
  a simulated operating system. The agent monitors real system telemetry via
  psutil, detects chaos events (memory leaks, CPU hogs, thermal spikes,
  zombie storms, fork bombs, semantic decoys), reasons through them using
  chain-of-thought, and takes corrective actions via structured tool calls.
  Trained using SFT (Unsloth LoRA) followed by GRPO (TRL GRPOTrainer).

theme:
  primary: "3.1"
  primary_name: "World Modeling (Professional Tasks)"
  secondary: "2"
  secondary_name: "Long-Horizon Planning"

environment:
  class: KaizenEnv
  module: environment.kaizen_env
  base_class: gymnasium.Env
  entry_point: "environment.kaizen_env:KaizenEnv"

  observation_space:
    type: Text
    description: >
      Real-time OS telemetry snapshot including CPU%, RAM%, thermal°C,
      uptime, top-8 process list with PIDs and CPU usage, active chaos
      event name (hidden from agent for partial observability), step counter,
      and system log snippet.

  action_space:
    type: Text
    description: >
      One of 7 structured JSON tool calls: kill_process, allocate_memory,
      thermal_mitigation, prioritize_task, inspect_logs, list_processes, wait.
      All validated via Pydantic v2 before execution.

  reset:
    description: >
      Collects fresh psutil observation, records protected PIDs, resets
      ChaosInjector state. Returns (obs_dict, info_dict).

  step:
    description: >
      Accepts raw LLM output string. Parses action with Pydantic v2.
      Injects chaos at step 3. Executes action in simulated sandbox.
      Computes reward. Broadcasts state via WebSocket.
      Returns (obs, reward, terminated, truncated, info).

  max_steps: 10
  chaos_inject_step: 3

  chaos_scenarios:
    - memory_leak
    - cpu_hog
    - thermal_spike
    - zombie_storm
    - fork_bomb
    - semantic_decoy

  reward_range: [-15.0, 12.0]
  termination: "Chaos resolved OR max_steps reached"
  truncation: "max_steps reached without chaos resolution"

model:
  name: Qwen2.5-3B-Instruct
  provider: unsloth/Qwen2.5-3B-Instruct
  quantization: 4-bit NF4
  adapter: LoRA (r=16, alpha=16)

training:
  stage_1:
    method: SFT
    framework: Unsloth + TRL SFTTrainer
    dataset: training/golden_examples.json
    examples: 60
    steps: 100
    output: kaizen_sft_model/
  stage_2:
    method: GRPO
    framework: TRL GRPOTrainer
    group_size: 4
    kl_coef: 0.1
    steps: 80
    output: kaizen_grpo_model/
    reward_function: environment.reward.compute_reward

hardware:
  target: Google Colab T4 (16GB VRAM)
  estimated_vram_sft: "6.2 GB"
  estimated_vram_grpo: "9.0 GB"

repository: https://github.com/ChikleNeha/kaizen2